taxonomy:
  id: my_taxonomy
  description: GEMS taxonomy configuration. This is an example to illustrate the data structure of a taxonomy configuration file. It is not meant to be used as is.

  categories:

    - id: balance
      variables:
        - id: unsupplied_energy
        - id: spilled_energy
      ports:
        - id: balance_port
      constraints:
        - id: balance
      extra-outputs:
        - id: price
        - id: imbalance_cost
        - id: is_loss_of_load
      properties:
        - id: carrier

    - id: production
      parameters:
        - id: total_p_max
      ports:
        - id: balance_port
      properties:
        - id: carrier
        - id: technology
      extra-outputs:
        - id: up_margin
        - id: down_margin

    - id: dispatchable_production
      parent-category: production
      variables: # just an example of how to use variables in a category
        - id: generation
      extra-outputs:
        - id: proportional_cost
        - id: non_proportional_cost
        - id: nb_units_on

    - id: fatal_production
      parent-category: production
      parameters:
        - id: generation

    - id: consumption
      extra-outputs:
        - id: withdrawal
      ports:
        - id: balance_port
      properties:
        - id: carrier

    - id: fatal_consumption
      parent-category: consumption     

    - id: flexible_consumption
      parent-category: consumption
      parameters:
        - id: min_load
        - id: max_load
      

    - id: storage
      # To be continued

    - id: link
      ports:
        - id: out_port
        - id: in_port

    - id: converter
      ports:
        - id: out_port
        - id: in_port

    - id: coupling_models

    - id: capacity_investment_decisions
      ports:
        - id: capacity_port
